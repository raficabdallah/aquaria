<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>Aquaria</title>

  <!-- Fonts: DM Sans for UI text, DM Mono for numbers/codes (per master prompt §31). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
  />

  <!-- Global design tokens (master prompt §31). Per-view styles are injected by JS modules. -->
  <style>
    :root {
      /* Brand */
      --accent:  #0ea5e9;
      --success: #10b981;
      --warning: #f59e0b;
      --danger:  #ef4444;
      --purple:  #8b5cf6;

      /* Text */
      --ink:   #0f172a;
      --ink-2: #334155;
      --mute:  #64748b;

      /* Surfaces */
      --line: #e2e8f0;
      --bg:   #f8fafc;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { mountShell } from "./src/ui/shell.js";
    mountShell(document.getElementById("app"));
  </script>
</body>
</html>
